    <title>第1714章 第二十一变断头术带来的底气</title>
</head>
<body class="calibreEbookContent">
<p>在接下来的日子里，晋安在《神照古经》方面的进境速度，每天都在日新月异的爆发。</p><p>他既有源源不绝的精元大丹支撑，每天吃精元大丹如吃糖豆一样，又有铅汞圣胎分身相互配合炼制精元大丹，把每天的时间效率压榨到极致，修为进境想不快都难。</p><p>他修炼《神照古经》半个月，已经有了别人两三百年苦修功力。</p><p>别的不说，单单是这一门《神照古经》修为，都可以让他比肩那些活了两个时代的老古董，老怪物们了。</p><p>也正因为进步神速，半个月时间就拥有两三百年功力，所以接下来他开始修炼《神照古经》的第二层。</p><p>《神照古经》第一层是气血印章，在自身气血镌刻元始古老的神纹印章。</p>
