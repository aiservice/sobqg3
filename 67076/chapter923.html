    <title>后记（六）</title>
</head>
<body class="calibreEbookContent">
<p>水月庵重新修葺一新，院内的那棵原本枯死的银杏树突然又死而复生，初夏的银杏树遮天蔽日郁郁葱葱焕发出勃勃生机，水月庵的后院新添了一座佛塔。</p><p>楚沧海几乎每周都会来到这里，每次前来他都会把新抄的心经焚化在佛塔前，心中总有一个孤傲的身影站在那里。</p><p>他不知还能来这里多久，不过他知道，自己在接下来的岁月中仍然会不断抄写心经然后焚化于此，是怀念还是赎罪，他不知道，也没必要知道。</p><p>他坚信曾经发生过的那些恩怨，曾经发生过的那些故事，终将随着时光的流逝而黯淡，可一切不会结束，即便是结束还会有一个新的开始，叶生叶落，生死循环周而复始，永远也不会有尽头……</p><p>（全书完）</p>
