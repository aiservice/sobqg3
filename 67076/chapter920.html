    <title>后记（三）</title>

<body class="calibreEbookContent">
<p>张弛走入神密局的控制中心，就走入了一个莺歌燕舞的春日世界，樱花树下，身穿校服的林黛雨正笑盈盈望着他。</p><p>张弛走了过去牵住她的手，目光却向下欣赏着她的美腿，赞道：“腿真白。”</p><p>林黛雨羞红了脸：“讨厌，你在幽冥墟还没欺负够我？”</p><p>张弛道：“这么远你都能感觉到啊？”</p><p>林黛雨红着俏脸道：“害得人家出了好几次故障。”</p><p>张弛道：“我就说这活儿不好干。”</p><p>林黛雨道：“我不入地狱谁入地狱啊，让别人来掌握控制中心，你也不放心啊。”</p><p>张弛点了点头道：“以后咱们做好防护措施。”</p><p>“嗯……”</p>
